name: Build portfolio data (prices, dividends, NAV, Nifty)

on:
  schedule:
    - cron: "15 21 * * *"   # daily ~02:45 IST (after NSE close + EOD settle)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-data
  cancel-in-progress: true

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build data (INR, stdlib only — no deps)
        env:
          STARTING_CASH: "10000000"   # ₹1 crore
          YEARS_BACK: "5"
          BENCH_SYMBOL: "^NSEI"       # Nifty 50 benchmark
          # Optional Google-Sheet fallback for stock prices (Nifty/dividends still come from Yahoo):
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          set -euo pipefail
          python -u scripts/ci/build_data.py

      - name: Show generated files
        run: |
          echo "== nav_summary.json ==" && cat data/nav_summary.json
          echo "== positions.json ==" && cat data/positions.json
          echo "== dividends.json (head) ==" && head -c 600 data/dividends.json; echo

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/quotes/*.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update data (prices, dividends, NAV, Nifty) [skip ci]"
            git push
          fi
